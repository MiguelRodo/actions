name: "Pre-build Dev Container"
description: "Builds a devcontainer, pushes it to a container registry tagged with a git tag and SemVer aliases, and optionally updates the prebuild JSON."
author: "Miguel Rodo <miguel.rodo@uct.ac.za>"

branding:
  icon: "box"
  color: "green"

inputs:
  github_token:
    description: "Token for logging into the container registry and pushing commits."
    required: true
  no_cache:
    description: "Disable Docker cache during build (true/false)."
    required: false
    default: "false"
  create_prebuild_json:
    description: "Generate, commit, and push the prebuild devcontainer.json (true/false)."
    required: false
    default: "true"
  devcontainer_path:
    description: "Path to the .devcontainer directory, relative to the repo root."
    required: false
    default: ".devcontainer"
  image_name:
    description: "Full image name without tag (e.g. 'ghcr.io/myorg/myimage'). Defaults to '{registry}/{repo}-{branch}'."
    required: false
    default: ""
  registry:
    description: "Container registry URL."
    required: false
    default: "ghcr.io"
  registry_username:
    description: "Username for registry login. Defaults to the repository owner."
    required: false
    default: ""
  version_force:
    description: "When 'true', skip the version progression check and push the specified version as-is, even if it is more than one increment ahead of (or behind) the previous image version."
    required: false
    default: "false"
  tag:
    description: "Git tag to use as the primary container image tag. (Deprecated, use 'version')"
    required: false
    default: ""
  version:
    description: >
      Exact version to set (e.g. v1.2.3 or main-v1.2.3).
      Cannot be set together with bump_type.
      Whitespace is ignored and case is insensitive.
    required: false
    default: ""
  bump_type:
    description: >
      Version component to bump (major | minor | patch).
      Cannot be set together with version.
      Whitespace is ignored and case is insensitive.
    required: false
    default: ""

outputs:
  image_name:
    description: "Full image name without tag (e.g. 'ghcr.io/owner/repo-main')."
    value: ${{ steps.set_outputs.outputs.image_name }}
  image_tag:
    description: "Primary image tag that was built and pushed (e.g. 'v1.2.3')."
    value: ${{ steps.set_outputs.outputs.image_tag }}
  image_ref:
    description: "Full image reference including tag (e.g. 'ghcr.io/owner/repo-main:v1.2.3')."
    value: ${{ steps.set_outputs.outputs.image_ref }}
  alias_tags:
    description: "Comma-separated list of SemVer alias tags that were also pushed (e.g. 'v1.2,v1')."
    value: ${{ steps.set_outputs.outputs.alias_tags }}

runs:
  using: "composite"
  steps:
    - name: Set branch name
      id: extract_branch
      shell: bash
      run: |
        if [[ "${GITHUB_REF}" == refs/heads/* ]]; then
          branch="${GITHUB_REF#refs/heads/}"
        else
          branch="main"
        fi
        echo "BRANCH_NAME=$branch" >> $GITHUB_ENV

    - name: Login to container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.registry_username != '' && inputs.registry_username || github.repository_owner }}
        password: ${{ inputs.github_token }}

    - name: Set dynamic image name and resolve version
      shell: bash
      env:
        INPUT_IMAGE_NAME: ${{ inputs.image_name }}
        INPUT_REGISTRY: ${{ inputs.registry }}
        INPUT_TAG: ${{ inputs.tag }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_BUMP: ${{ inputs.bump_type }}
      run: |
        # Safely map inputs to environment variables to prevent shell injection
        BRANCH_SUFFIX=${BRANCH_NAME//\//-}

        if [ -z "${INPUT_IMAGE_NAME}" ]; then
          echo "IMAGE_NAME=${INPUT_REGISTRY}/${GITHUB_REPOSITORY,,}-${BRANCH_SUFFIX,,}" >> $GITHUB_ENV
        else
          echo "IMAGE_NAME=${INPUT_IMAGE_NAME}" >> $GITHUB_ENV
        fi

        # Consolidate legacy input
        VERSION_INPUT="${INPUT_VERSION:-$INPUT_TAG}"
        BUMP_INPUT=$(echo "$INPUT_BUMP" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')

        if [ -n "$VERSION_INPUT" ] && [ -n "$BUMP_INPUT" ]; then
          echo "Error: cannot set both 'version' (or 'tag') and 'bump_type'." >&2
          exit 1
        fi

        # Determine primary tag: use bump_type, exact input, or auto-detect from GITHUB_REF
        if [ -n "$BUMP_INPUT" ]; then
          
          # Query the registry for existing Docker image tags using skopeo
          PREV_TAG=$(skopeo list-tags --authfile ~/.docker/config.json "docker://${IMAGE_NAME}" 2>/dev/null \
            | jq -r '.Tags[]?' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n 1 || true)
          
          # Handle the very first build gracefully
          if [ -z "$PREV_TAG" ]; then
            echo "Notice: Could not determine current version from GHCR. Defaulting to v0.0.0 for initial bump."
            PREV_TAG="v0.0.0"
          fi
          
          CURRENT="${PREV_TAG#v}"
          VERSION=$("$GITHUB_ACTION_PATH/../scripts/apply-version-bump.sh" "$BUMP_INPUT" "$CURRENT")
          IMAGE_TAG="v${VERSION}"
          
        elif [ -n "$VERSION_INPUT" ]; then
          IMAGE_TAG=$(echo "$VERSION_INPUT" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG="${IMAGE_TAG#v}"
          # Prepend 'v' back if it's a valid semver string to keep original devcontainer behavior
          if [[ "$IMAGE_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            IMAGE_TAG="v${IMAGE_TAG}"
          fi
        elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          IMAGE_TAG="${GITHUB_REF#refs/tags/}"
        else
          IMAGE_TAG="latest"
        fi
        
        echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

    - name: Parse SemVer aliases
      shell: bash
      run: |
        ALIAS_TAGS=$("$GITHUB_ACTION_PATH/../scripts/parse-semver-aliases.sh" "${IMAGE_TAG}")
        echo "ALIAS_TAGS=${ALIAS_TAGS}" >> "$GITHUB_ENV"

    - name: Check version progression
      shell: bash
      env:
        VERSION_FORCE: ${{ inputs.version_force }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        if [ "${VERSION_FORCE}" = "true" ]; then
          echo "version_force=true; skipping version progression check."
          exit 0
        fi

        # Only check SemVer tags
        if [[ "${IMAGE_TAG}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
          NEW_VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
          TAG_PREFIX=""
        elif [[ "${IMAGE_TAG}" =~ ^(.+)-v([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
          TAG_PREFIX="${BASH_REMATCH[1]}-"
          NEW_VERSION="${BASH_REMATCH[2]}.${BASH_REMATCH[3]}.${BASH_REMATCH[4]}"
        else
          echo "Tag '${IMAGE_TAG}' is not a SemVer tag; skipping version progression check."
          exit 0
        fi

        # Only supported for ghcr.io
        if [[ "${IMAGE_NAME}" != ghcr.io/* ]]; then
          echo "Version progression check is only supported for ghcr.io; skipping."
          exit 0
        fi

        # Parse owner and package from IMAGE_NAME (ghcr.io/owner/package)
        REST="${IMAGE_NAME#ghcr.io/}"
        OWNER="${REST%%/*}"
        PACKAGE="${REST#*/}"
        ENCODED_PACKAGE="${PACKAGE//\//%2F}"

        GITHUB_TOKEN="${INPUT_GITHUB_TOKEN}"

        # Try org packages endpoint, then user packages endpoint
        VERSIONS=$(curl -sf \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/orgs/${OWNER}/packages/container/${ENCODED_PACKAGE}/versions?per_page=100" \
          2>/dev/null || echo "[]")

        if ! echo "${VERSIONS}" | jq -e 'type == "array" and length > 0' > /dev/null 2>&1; then
          VERSIONS=$(curl -sf \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/packages/container/${ENCODED_PACKAGE}/versions?per_page=100" \
            2>/dev/null || echo "[]")
        fi

        if ! echo "${VERSIONS}" | jq -e 'type == "array" and length > 0' > /dev/null 2>&1; then
          echo "No existing image found in registry; skipping version progression check."
          exit 0
        fi

        # Build grep pattern for full SemVer tags matching the same prefix
        if [ -z "${TAG_PREFIX}" ]; then
          SEMVER_GREP='^v[0-9]+\.[0-9]+\.[0-9]+$'
        else
          SEMVER_GREP="^${TAG_PREFIX}v[0-9]+\\.[0-9]+\\.[0-9]+\$"
        fi

        PREV_VERSION=$(echo "${VERSIONS}" \
          | jq -r '.[].metadata.container.tags[]? // empty' \
          | grep -E "${SEMVER_GREP}" \
          | grep -vxF "${IMAGE_TAG}" \
          | sed "s/^${TAG_PREFIX}v//" \
          | sort -V \
          | tail -1)

        if [ -z "${PREV_VERSION}" ]; then
          echo "No previous SemVer version found for image; skipping version progression check."
          exit 0
        fi

        echo "Previous version: ${PREV_VERSION}, new version: ${NEW_VERSION}"
        echo "To skip this check, set version_force: 'true'."
        "$GITHUB_ACTION_PATH/../scripts/check-version-progression.sh" "${NEW_VERSION}" "${PREV_VERSION}"

    - name: Determine cache source
      id: determine_cache
      shell: bash
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        if [[ "${IMAGE_NAME}" != ghcr.io/* ]]; then
          echo "Cache determination is only supported for ghcr.io; falling back to latest."
          echo "CACHE_FROM=${IMAGE_NAME}:latest" >> $GITHUB_ENV
          exit 0
        fi

        REST="${IMAGE_NAME#ghcr.io/}"
        OWNER="${REST%%/*}"
        PACKAGE="${REST#*/}"
        ENCODED_PACKAGE="${PACKAGE//\//%2F}"
        GITHUB_TOKEN="${INPUT_GITHUB_TOKEN}"

        VERSIONS=$(curl -sf \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/orgs/${OWNER}/packages/container/${ENCODED_PACKAGE}/versions?per_page=100" \
          2>/dev/null || echo "[]")

        if ! echo "${VERSIONS}" | jq -e 'type == "array" and length > 0' > /dev/null 2>&1; then
          VERSIONS=$(curl -sf \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/packages/container/${ENCODED_PACKAGE}/versions?per_page=100" \
            2>/dev/null || echo "[]")
        fi

        ALL_TAGS=$(echo "${VERSIONS}" | jq -r '.[].metadata.container.tags[]? // empty' 2>/dev/null)

        if [ -z "$ALL_TAGS" ]; then
          echo "No existing tags found in registry. Falling back to latest (will gracefully cache-miss)."
          echo "CACHE_FROM=${IMAGE_NAME}:latest" >> $GITHUB_ENV
          exit 0
        fi

        if echo "$ALL_TAGS" | grep -qFx "latest"; then
          echo "Found 'latest' tag. Using as cache source."
          CACHE_TAG="latest"
        else
          # Determine Prefix if any (e.g. main-v1.2.3)
          if [[ "${IMAGE_TAG}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            TAG_PREFIX=""
          elif [[ "${IMAGE_TAG}" =~ ^(.+)-v([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            TAG_PREFIX="${BASH_REMATCH[1]}-"
          else
            TAG_PREFIX=""
          fi

          if [ -z "${TAG_PREFIX}" ]; then
            SEMVER_GREP='^v[0-9]+\.[0-9]+\.[0-9]+$'
          else
            SEMVER_GREP="^${TAG_PREFIX}v[0-9]+\\.[0-9]+\\.[0-9]+\$"
          fi

          PREV_TAG=$(echo "$ALL_TAGS" \
            | grep -E "${SEMVER_GREP}" \
            | grep -vxF "${IMAGE_TAG}" \
            | sort -V \
            | tail -1)

          if [ -n "$PREV_TAG" ]; then
            echo "Found previous SemVer tag '${PREV_TAG}'. Using as cache source."
            CACHE_TAG="$PREV_TAG"
          else
            # Grab the most recently created tag by taking the first tag from the JSON
            FIRST_TAG=$(echo "$ALL_TAGS" | grep -v '^\s*$' | head -n 1)
            if [ -n "$FIRST_TAG" ]; then
              echo "No 'latest' or previous SemVer tag found. Using most recent tag '${FIRST_TAG}' as cache source."
              CACHE_TAG="$FIRST_TAG"
            else
              echo "No usable tags found. Falling back to latest."
              CACHE_TAG="latest"
            fi
          fi
        fi

        echo "CACHE_FROM=${IMAGE_NAME}:${CACHE_TAG}" >> $GITHUB_ENV

    - name: Compute devcontainer subfolder
      shell: bash
      env:
        DEVCONTAINER_PATH_INPUT: ${{ inputs.devcontainer_path }}
      run: |
        DEVCONTAINER_PATH="${DEVCONTAINER_PATH_INPUT}"
        DEVCONTAINER_PATH="${DEVCONTAINER_PATH%/}"
        DIR=$(dirname "$DEVCONTAINER_PATH")
        if [ "$DIR" = "." ]; then
          echo "DEVCONTAINER_SUBFOLDER=" >> $GITHUB_ENV
        else
          echo "DEVCONTAINER_SUBFOLDER=$DIR" >> $GITHUB_ENV
        fi

    - name: Calculate and Export Tracking Metadata
      shell: bash
      run: |
        CURRENT_BUMP_VERSION="${IMAGE_TAG}"
        if [ -z "$CURRENT_BUMP_VERSION" ]; then
          CURRENT_BUMP_VERSION="development"
        fi
        UTC_NOW=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
        echo "IMAGE_VERSION=${CURRENT_BUMP_VERSION}" >> $GITHUB_ENV
        echo "IMAGE_BUILD_DATE=${UTC_NOW}" >> $GITHUB_ENV
        echo "Host variables prepared: Version=$CURRENT_BUMP_VERSION, Date=$UTC_NOW"

    - name: Pre-build dev container image
      uses: devcontainers/ci@v0.3
      with:
        imageName: ${{ env.IMAGE_NAME }}
        imageTag: ${{ env.IMAGE_TAG }}
        push: never
        eventFilterForPush: ""
        noCache: ${{ inputs.no_cache }}
        subFolder: ${{ env.DEVCONTAINER_SUBFOLDER }}
        cacheFrom: ${{ env.CACHE_FROM }}

    - name: Tag and push SemVer alias images
      shell: bash
      run: |
        docker push "${IMAGE_NAME}:${IMAGE_TAG}"
        
        # Automatically apply the latest tag alongside the version bump
        if [ "${IMAGE_TAG}" != "latest" ]; then
          docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:latest"
        fi
        
        if [ -n "${ALIAS_TAGS}" ]; then
          IFS=',' read -ra TAGS <<< "${ALIAS_TAGS}"
          for alias_tag in "${TAGS[@]}"; do
            docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${IMAGE_NAME}:${alias_tag}"
            docker push "${IMAGE_NAME}:${alias_tag}"
          done
        fi

    - name: Update or create prebuild/devcontainer.json
      if: ${{ inputs.create_prebuild_json == 'true' }}
      shell: bash
      env:
        DEVCONTAINER_PATH_INPUT: ${{ inputs.devcontainer_path }}
      run: |
        FULL_IMAGE_REF="${IMAGE_NAME}:${IMAGE_TAG}"
        DEVCONTAINER_PATH="${DEVCONTAINER_PATH_INPUT}"
        DEVCONTAINER_JSON="${DEVCONTAINER_PATH}/devcontainer.json"
        PREBUILD_JSON="${DEVCONTAINER_PATH}/prebuild/devcontainer.json"

        mkdir -p "$(dirname "$PREBUILD_JSON")"

        if [ -f "$PREBUILD_JSON" ]; then
          jq --arg image "$FULL_IMAGE_REF" '.image = $image' "$PREBUILD_JSON" > temp.json && mv temp.json "$PREBUILD_JSON"
        else
          if [ -f "$DEVCONTAINER_JSON" ]; then
            jq --arg image "$FULL_IMAGE_REF" \
              '{image: $image, customizations: .customizations}' \
              "$DEVCONTAINER_JSON" > "$PREBUILD_JSON"
          else
            echo "No devcontainer.json found at '${DEVCONTAINER_JSON}' to copy customizations from!"
            exit 1
          fi
        fi

    - name: Commit and push changes
      if: ${{ inputs.create_prebuild_json == 'true' }}
      shell: bash
      env:
        DEVCONTAINER_PATH_INPUT: ${{ inputs.devcontainer_path }}
      run: |
        DEVCONTAINER_PATH="${DEVCONTAINER_PATH_INPUT}"
        PREBUILD_JSON="${DEVCONTAINER_PATH}/prebuild/devcontainer.json"

        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add "$PREBUILD_JSON"

        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update prebuild devcontainer.json with image ${IMAGE_NAME}:${IMAGE_TAG}"

          if ! git push; then
            echo "::error::Failed to push the prebuild/devcontainer.json file to the repository."
            echo "======================================================================================="
            echo "❌ GITHUB ACTIONS PERMISSION ERROR"
            echo ""
            echo "By default, GitHub Actions lack write permissions to commit back to the repository."
            echo ""
            echo "🛠️  HOW TO FIX THIS:"
            echo "1. Ensure the calling workflow has 'permissions: contents: write'."
            echo "2. Go to your repository settings -> Actions -> General."
            echo "3. Change 'Workflow permissions' to 'Read and write permissions'."
            echo "======================================================================================="
            exit 1
          fi
        fi

    - name: Set action outputs
      id: set_outputs
      shell: bash
      run: |
        echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
        echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
        echo "image_ref=${IMAGE_NAME}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
        echo "alias_tags=${ALIAS_TAGS}" >> "$GITHUB_OUTPUT"
