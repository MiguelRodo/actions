name: Test prebuild-devcontainer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-prebuild-devcontainer:
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Create mock devcontainer.json
        run: |
          mkdir -p .devcontainer
          cat << 'JSON' > .devcontainer/devcontainer.json
          {
            "image": "ubuntu:latest"
          }
          JSON

      - name: Workaround devcontainers/ci buildx push issue to local registry
        # The devcontainers/ci action runs buildx which has intermittent issues pushing to an insecure local http registry
        run: |
          docker system prune -a -f

      - name: Run prebuild-devcontainer action
        uses: ./prebuild-devcontainer
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          create_prebuild_json: 'false'
          image_name: 127.0.0.1:5000/test-repo-main
          # Use a non-semver tag so it doesn't push alias tags which can cause blob unknown errors with local registry
          tag: latest
          registry: 127.0.0.1:5000
          registry_username: testuser

      - name: Verify image was pushed to local registry
        run: |
          curl -s http://127.0.0.1:5000/v2/_catalog | grep "test-repo-main"
          curl -s http://127.0.0.1:5000/v2/test-repo-main/tags/list | grep "latest"
