name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  actionlint:
    name: Lint workflow and action files (actionlint + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Install actionlint
        run: |
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          sudo mv actionlint /usr/local/bin/actionlint

      - name: Run actionlint (includes shellcheck for inline scripts)
        # actionlint automatically delegates shell script linting to shellcheck
        # when it is available on PATH, covering both workflow files and
        # composite action.yml inline `run:` blocks.
        run: actionlint
